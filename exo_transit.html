<!DOCTYPE HTML>
<html lang="en">
<meta charset="utf-8"/>
	<head>
		<title> Exoplanet Transit Light Curve Application </title>

		<link rel="stylesheet" type="text/css" href="styles.css">

	</head>

	<body>

		<div class="title">
			<h1 style="margin:12px"> Exoplanet Transit Light Curve Application</h1>
		</div>

		<div id="content">

			<div class="control">

				<div class="panel">
					<h2> Data </h2>
					<div style="display:flex;gap:12px;flex-wrap:wrap">
						<div class="button"> <button id="fileLoad">Open CSV</button> </div>
						<div class="button"> <button id="reset">Reset</button> </div>
					</div>

					<input id="fileInput" type="file" accept=".csv,text/csv" style="display:none"/>


				</div>

				<div class="panel">
					<h2 id="modelType"> Model <input type="checkbox" id="showmod" checked/>  </h2>

					<!--
					<div style="display:flex;gap:5px;flex-wrap:wrap">

						<div class="button"> 

							
							<label id="nlabel">
							  <span title="Number of model data points used to calculate and draw the curve.">
							    N
							  </span>
							  =
							  <input type="number" id="nmod" value="10000" step="10" min="10">
							</label>
							

							<label><input type="checkbox" id="showmod" checked/> Show</label>
						</div>

					</div>
					-->

					<!--<div id="modelFormula"> <p> V<sub>p</sub> = (GM/d)<sup>1/2</sup> </p> </div>
					<div id="modelFormula2"> <p> V<sub>r</sub> = Vp*sin(i)*sin[2&pi;(t/T+&phi;)] </p> </div> -->

					<div id="modelParams"> 

						<div class="model-grid">
							<div class="param-row">
							    <label for="Mstar">Star Mass (M<sub>s</sub>)</label>

							    <div class="slider-wrap">
							        <input type="range"
							               id="Mstar_slider"
							               min="0.0"
							               max="10"
							               step="0.1"
							               value="1">

							        <input type="number"
							               id="Mstar"
							               min="0.0"
							               max="10"
							               step="0.1"
							               value="1">

							        <span class="param-unit">M <sub>&odot;</sub></span>

							    </div>
							</div>

							<div class="param-row">
							    <label for="Rstar">Star Radius (R<sub>s</sub>)</label>

							    <div class="slider-wrap">
							        <input type="range"
							               id="Rstar_slider"
							               min="0.0"
							               max="10"
							               step="0.1"
							               value="1.0">

							        <input type="number"
							               id="Rstar"
							               min="0.0"
							               step="0.1"
							               value="1">
									<span class="param-unit">R <sub>&odot;</sub></span>
							    </div>
							</div>
						</div>

						<div class="model-grid">

							<div class="param-row">
							    <label for="Rplanet"> Planet Radius (R<sub>p</sub>)</span></label>

							    <div class="slider-wrap">
							        <input type="range"
							               id="Rplanet_slider"
							               min="0.0"
							               max="10"
							               step="0.01"
							               value="1">

							        <input type="number"
							               id="Rplanet"
							               min="0.0"
							               max="10"
							               step="0.01"
							               value="1">
							        <span class="param-unit">R<sub>J</sub></span>
							    </div>
							</div>

							<div class="param-row">
							    <label for="Tplanet"><span title="Time it takes for exoplanet to complete a single orbit, assuming a circular orbit.">Orbital Period (T)</span></label>

							    <div class="slider-wrap">
							        <input type="range"
							               id="Tplanet_slider"
							               min="0."
							               max="1000"
							               step="0.1"
							               value="10"
							               >

							        <input type="number"
							               id="Tplanet"
							               min="0."
							               step="1"
							               value="10"
							               >

							        <span class="param-unit"> Days </span>

							    </div>
							</div>

							<div class="param-row">
							    <label for="Semi"><span title="Semi-major axis of orbiting exoplanet assuming a circular orbit.">Orbital Distance (d)</span></label>

							    <div class="slider-wrap">
							        <input type="number"
							               id="Semi"
							               value="0.09"
							               disabled>
							        <span class="param-unit">AU</span>
							    </div>
							</div>

							<div class="param-row">
							    <label for="Offset"> <span title="Shift model curve horizontally so first transit does not begin at t=0 days.">Offset</span> (<span>&#632;</span>) </label>

							    <div class="slider-wrap">
							        <input type="range"
							               id="Offset_slider"
							               min="0.0"
							               max="10"
							               step="0.1"
							               value="0">

							        <input type="number"
							               id="Offset"
							               min="0.0"
							               max="10"
							               step="0.1"
							               value="0">
							        <span class="param-unit"> Days </span>

							    </div>
							</div>	
						</div>	
					</div>

				</div>

      			<div class="panel">

					<h2> Plot Controls </h2>

					<div id='axiscontrols'>

					<div style="display:flex;gap:12px;flex-wrap:wrap">
 						<label>X Min <input type="number" id="xmin" min=0 value="0", step="0.1"> </label>
 						<label>X Max <input type="number" id="xmax" min=0.01 value="50", step="0.1"> </label>
 					</div>
 					<br>
 					<div style="display:flex;gap:12px;flex-wrap:wrap">
 						<label>Y Min <input type="number" id="ymin" value="0.98", min=0 step="0.01"> </label>
 						<label>Y Max <input type="number" id="ymax" value="1.02", step="0.01"> </label>
				    </div>

					</div>

				    <br>

 					<div style="display:flex; flex-direction:column; gap:12px;">
 						<button id="autoscale">Autoscale</button>
 						<div style="display:flex;gap:12px;flex-wrap:wrap">
	 						<label><input type="checkbox" id="xlogplot"/> Log X-Axis</label>
	 						<label><input type="checkbox" id="ylogplot"/> Log Y-Axis</label>
 						</div>
				    </div>


				</div>


			</div>


			<div class="figure">
      			<div id="plot" style="height:100%"></div>
			</div>

		</div>

		<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
		<script type="text/javascript" src="functions.js"></script>
		<script type="text/javascript" src="plotting.js"></script>
		<script type="text/javascript" src="transit.js"></script>

	</body>
</html>
