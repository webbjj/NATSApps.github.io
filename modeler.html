<!DOCTYPE HTML>
<html lang="en">
<meta charset="utf-8"/>
	<head>
		<title> CSV Modeling Application </title>

		<link rel="stylesheet" type="text/css" href="styles.css">


	</head>

	<body>

		<div id="content">

			<div>
				<h1> CSV Plotting Application </h1>
			</div>

			<div class="control">

				<div class="panel">
					<h2> Data </h2>
					<div style="display:flex;gap:12px;flex-wrap:wrap">
						<div class="button"> <button id="fileLoad">Open CSV</button> </div>
						<div class="button"> <button id="reset">Reset</button> </div>
					</div>

					<input id="fileInput" type="file" accept=".csv,text/csv" style="display:none"/>


				</div>

				<div class="panel">

					<h2> Plot Controls </h2>

					<div id='axiscontrols'>

					<div style="display:flex;gap:12px;flex-wrap:wrap">
						<label>X Min <input type="number" id="xmin" value="-1", step="0.1"> </label>
						<label>X Max <input type="number" id="xmax" value="1", step="0.1"> </label>
					</div>
					<br>
					<div style="display:flex;gap:12px;flex-wrap:wrap">
						<label>Y Min <input type="number" id="ymin" value="-1", step="0.1"> </label>
						<label>Y Max <input type="number" id="ymax" value="1", step="0.1"> </label>
					</div>

					</div>

					<br>

					<div style="display:flex; flex-direction:column; gap:12px;">
						<button id="autoscale">Autoscale</button>
						<div style="display:flex;gap:12px;flex-wrap:wrap">
							<label><input type="checkbox" id="xlogplot"/> Log X-Axis</label>
							<label><input type="checkbox" id="ylogplot"/> Log Y-Axis</label>
						</div>
					</div>


				</div>

				<div class="panel">
					<h2> Model </h2>
					<div style="display:flex;gap:12px;flex-wrap:wrap">

						<select id="modelType">
							<option value="none"> None </option>
							<option value="linear"> Linear </option>
							<option value="powerlaw"> Power Law </option>
							<option value="exponential"> Exponential </option>
							<option value="sinusoidal"> Sinusoidal </option>
						</select>

						<label> N = <input type="number" id="nmod" value="10" step="5" min="10"> </label>


					</div>

					<br>

					<div id="modelFormula"> </div>
					<div id="modelParams"> </div>

				</div>



			</div>


			<div class="figure">
      			<div id="plot" style="height:520px"></div>
			</div>

		</div>


	<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
	<script type="text/javascript" src="modeling.js"></script>

	</body>
</html>
