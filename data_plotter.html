<!DOCTYPE HTML>
<html lang="en">
<meta charset="utf-8"/>
	<head>
		<title> Data Plotting Application </title>

		<link rel="stylesheet" type="text/css" href="styles.css">

	</head>

	<body>

		<div class="title">
			<h1 style="margin:12px"> Data Plotting Application </h1>
		</div>

		<div id="content">

			<div class="control">

				<div class="panel">
					<h2> Data </h2>
					<div style="display:flex;gap:12px;flex-wrap:wrap">
						<div class="button"> <button id="fileLoad">Open CSV</button> </div>
						<div class="button"> <button id="reset">Reset</button> </div>
					</div>

					<input id="fileInput" type="file" accept=".csv,text/csv" style="display:none"/>


				</div>

				<div class="panel">

					<h2> Plot Controls </h2>

					<div id='axiscontrols'>

					<div style="display:flex;gap:12px;flex-wrap:wrap">
						<label>X Min <input type="number" id="xmin" value="-1", step="0.1"> </label>
						<label>X Max <input type="number" id="xmax" value="1", step="0.1"> </label>
					</div>
					<br>
					<div style="display:flex;gap:12px;flex-wrap:wrap">
						<label>Y Min <input type="number" id="ymin" value="-1", step="0.1"> </label>
						<label>Y Max <input type="number" id="ymax" value="1", step="0.1"> </label>
					</div>

					</div>

					<br>

					<div style="display:flex; flex-direction:column; gap:12px;">
						<button id="autoscale">Autoscale</button>
						<div style="display:flex;gap:12px;flex-wrap:wrap">
							<label><input type="checkbox" id="xlogplot"/> Log X-Axis</label>
							<label><input type="checkbox" id="ylogplot"/> Log Y-Axis</label>
						</div>
					</div>


				</div>

			</div>


			<div class="figure">
				<div id="plot" style="height:100%"></div>
			</div>

		</div>

		<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
		<script type="text/javascript" src="plotting.js"></script>

	</body>
</html>
